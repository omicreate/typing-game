<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>星待ちの放課後 — セリフタイピング</title>
<meta name="description" content="表示されたセリフをローマ字で打つと物語が進む、縦型のセリフタイピングゲーム。" />
<style>
  :root {
    --primary: #6d5efc;
    --primary-hover: #5a4be0;
    --accent: #ff7a59;
    --text: #f3f3fa;
    --text-muted: #a7a7c2;
    --surface: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.14);
    --good: #4fd1a5;
    --bad: #ff6b73;
    --font: "Hiragino Sans", "Noto Sans JP", system-ui, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    color: var(--text);
    background: #0c0c16;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    overflow: hidden;
  }

  /* 9:16 vertical stage */
  .stage {
    position: relative;
    width: 100%;
    max-width: 430px;
    height: 100dvh;
    max-height: min(100dvh, calc(430px * 16 / 9));
    aspect-ratio: 9 / 16;
    overflow: hidden;
    background:
      radial-gradient(120% 80% at 50% 0%, var(--g1, #2b2150), transparent 60%),
      radial-gradient(120% 80% at 50% 100%, var(--g2, #141026), #0c0c16 70%);
    transition: --g1 600ms, --g2 600ms;
    display: flex;
    flex-direction: column;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
  }
  @property --g1 { syntax: "<color>"; inherits: true; initial-value: #2b2150; }
  @property --g2 { syntax: "<color>"; inherits: true; initial-value: #141026; }

  /* twinkling stars */
  .stars { position: absolute; inset: 0; pointer-events: none; }
  .stars i {
    position: absolute; width: 2px; height: 2px; border-radius: 50%;
    background: #fff; opacity: 0.5; animation: tw 3s infinite ease-in-out;
  }
  @keyframes tw { 0%,100% { opacity: 0.15; } 50% { opacity: 0.9; } }

  .topbar {
    position: relative; z-index: 2;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; font-size: 12px; color: var(--text-muted);
  }
  .title-chip { font-weight: 700; color: var(--text); letter-spacing: .02em; }
  .stat-row { display: flex; gap: 14px; font-variant-numeric: tabular-nums; }
  .stat-row b { color: var(--text); font-weight: 700; }

  .scene {
    position: relative; z-index: 2; flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px; padding: 12px 22px;
  }

  .avatar {
    width: 116px; height: 116px; border-radius: 50%;
    display: grid; place-items: center;
    font-size: 46px; font-weight: 800; color: #fff;
    background: linear-gradient(145deg, var(--c1, var(--primary)), var(--c2, var(--accent)));
    box-shadow: 0 12px 40px rgba(0,0,0,.4), inset 0 0 0 4px rgba(255,255,255,.12);
    transition: transform 500ms cubic-bezier(.2,.9,.3,1.2), background 500ms;
    transform: translateY(0);
  }
  .scene.pop .avatar { animation: pop 500ms cubic-bezier(.2,.9,.3,1.2); }
  @keyframes pop { 0% { transform: scale(.7) translateY(14px); opacity: .3; } 100% { transform: scale(1) translateY(0); opacity: 1; } }

  .speaker {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 700; color: var(--text);
    background: var(--surface); border: 1px solid var(--border);
    padding: 5px 12px; border-radius: 999px;
  }
  .speaker .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--c1, var(--primary)); }

  .line-jp {
    text-align: center; font-size: clamp(20px, 6.2vw, 27px); font-weight: 700;
    line-height: 1.5; letter-spacing: .01em; min-height: 1.5em;
    text-wrap: balance;
  }

  .line-romaji {
    text-align: center; font-size: clamp(15px, 4.4vw, 19px);
    line-height: 1.9; letter-spacing: .04em; font-weight: 600;
    word-break: break-word;
  }
  .line-romaji .done { color: var(--primary); }
  .line-romaji .cur {
    color: var(--text); border-bottom: 3px solid var(--accent); border-radius: 2px;
  }
  .line-romaji .todo { color: var(--text-muted); }
  .line-romaji.miss { animation: shake 240ms; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  .progress { display: flex; gap: 7px; justify-content: center; flex-wrap: wrap; }
  .progress span { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .progress span.on { background: var(--accent); }
  .progress span.now { background: var(--text); transform: scale(1.25); }

  .footer { position: relative; z-index: 2; padding: 14px 22px 26px; text-align: center; }
  .hint { font-size: 12px; color: var(--text-muted); }

  /* overlay screens */
  .overlay {
    position: absolute; inset: 0; z-index: 5;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 32px; text-align: center;
    background: linear-gradient(180deg, rgba(12,12,22,.72), rgba(12,12,22,.92));
    backdrop-filter: blur(6px);
  }
  .overlay.hidden { display: none; }
  .game-title { font-size: 30px; font-weight: 800; line-height: 1.25; }
  .game-title small { display: block; font-size: 14px; font-weight: 600; color: var(--accent); margin-top: 8px; letter-spacing: .14em; }
  .lead { font-size: 14px; color: var(--text-muted); line-height: 1.7; max-width: 30ch; }

  .btn {
    appearance: none; border: 0; cursor: pointer; font-family: inherit;
    font-size: 16px; font-weight: 700; color: #fff;
    background: var(--primary); padding: 14px 30px; border-radius: 12px;
    transition: background 140ms, transform 80ms;
    box-shadow: 0 10px 30px rgba(109,94,252,.4);
  }
  .btn:hover { background: var(--primary-hover); }
  .btn:active { transform: translateY(1px); }
  .btn.ghost { background: transparent; color: var(--text); box-shadow: none; border: 1px solid var(--border); }

  .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 320px; }
  .result-grid .cell {
    background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 8px;
  }
  .result-grid .num { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .result-grid .lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .rank { font-size: 56px; font-weight: 900; line-height: 1; background: linear-gradient(120deg, var(--primary), var(--accent)); -webkit-background-clip: text; background-clip: text; color: transparent; }

  /* invisible capture input (also summons mobile keyboard) */
  .capture { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; }

  .credit { position: absolute; bottom: 8px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,.25); z-index: 2; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="stars" id="stars"></div>

    <div class="topbar">
      <span class="title-chip">星待ちの放課後</span>
      <span class="stat-row">
        <span>COMBO <b id="combo">0</b></span>
        <span>正確 <b id="acc">100</b>%</span>
        <span><b id="time">0.0</b>s</span>
      </span>
    </div>

    <div class="scene" id="scene">
      <div class="avatar" id="avatar">★</div>
      <div class="speaker"><span class="dot"></span><span id="speaker">ナレーション</span></div>
      <div class="line-jp" id="lineJp">—</div>
      <div class="line-romaji" id="lineRomaji"></div>
    </div>

    <div class="footer">
      <div class="progress" id="progress"></div>
      <div class="hint" style="margin-top:12px;">表示されたローマ字をそのまま入力 ／ スペースは自動で飛ばします</div>
    </div>

    <input class="capture" id="capture" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" />

    <!-- Start screen -->
    <div class="overlay" id="startScreen">
      <div class="game-title">星待ちの放課後<small>SERIFU TYPING</small></div>
      <p class="lead">表示されるセリフを<strong>ローマ字</strong>で打つと、物語のカットが進みます。<br>全{N}カット、放課後の小さな物語を打ち切ろう。</p>
      <button class="btn" id="startBtn">はじめる</button>
      <p class="hint">キーボード推奨 ／ スマホは画面タップで入力欄が出ます</p>
    </div>

    <!-- Result screen -->
    <div class="overlay hidden" id="resultScreen">
      <div class="rank" id="rank">A</div>
      <div class="game-title" style="font-size:22px;">クリア！</div>
      <div class="result-grid">
        <div class="cell"><div class="num" id="rTime">0</div><div class="lbl">秒</div></div>
        <div class="cell"><div class="num" id="rAcc">100</div><div class="lbl">正確率 %</div></div>
        <div class="cell"><div class="num" id="rCombo">0</div><div class="lbl">最大コンボ</div></div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <button class="btn" id="retryBtn">もう一度</button>
        <button class="btn ghost" id="shareBtn">記録をコピー</button>
      </div>
      <p class="hint" id="shareHint"> </p>
    </div>

    <div class="credit">© オリジナル脚本 ／ 単一HTML製</div>
  </div>

<script>
(() => {
  // ---- Original script: speaker, gradient theme, JP line, romaji to type ----
  const CUTS = [
    { who: "ナレーション", glyph: "★", c1: "#8a7dff", c2: "#3b2f6e", g1: "#241c47", g2: "#120f28",
      jp: "放課後、誰もいない屋上。", romaji: "houkago daremo inai okujou" },
    { who: "ひなた", glyph: "ひ", c1: "#6d5efc", c2: "#9b8bff", g1: "#2b2150", g2: "#141026",
      jp: "ねえ、今日って星が見える日かな。", romaji: "nee kyou tte hoshi ga mieru hi kana" },
    { who: "そら", glyph: "そ", c1: "#ff7a59", c2: "#ffb199", g1: "#3a2238", g2: "#161021",
      jp: "たぶんね。空がこんなに澄んでる。", romaji: "tabun ne sora ga konnani sunderu" },
    { who: "ひなた", glyph: "ひ", c1: "#6d5efc", c2: "#9b8bff", g1: "#2b2150", g2: "#141026",
      jp: "あなたの名前、そらっていうのにね。", romaji: "anata no namae sora tte iu noni ne" },
    { who: "そら", glyph: "そ", c1: "#ff7a59", c2: "#ffb199", g1: "#3a2238", g2: "#161021",
      jp: "それ、何回も言ってるよ。", romaji: "sore nankai mo itteru yo" },
    { who: "ひなた", glyph: "ひ", c1: "#6d5efc", c2: "#9b8bff", g1: "#2b2150", g2: "#141026",
      jp: "だって本当のことだもん。", romaji: "datte hontou no koto da mon" },
    { who: "そら", glyph: "そ", c1: "#ff7a59", c2: "#ffb199", g1: "#3a2238", g2: "#161021",
      jp: "…ほら、一番星。", romaji: "hora ichiban boshi" },
    { who: "ひなた", glyph: "ひ", c1: "#6d5efc", c2: "#9b8bff", g1: "#2b2150", g2: "#141026",
      jp: "わあ、ほんとだ！", romaji: "waa honto da" },
    { who: "ナレーション", glyph: "☆", c1: "#8a7dff", c2: "#3b2f6e", g1: "#241c47", g2: "#120f28",
      jp: "ふたりの放課後は、まだ続く。", romaji: "futari no houkago wa mada tsuzuku" },
  ];

  const el = (id) => document.getElementById(id);
  const stage = el("stage"), scene = el("scene");
  const avatar = el("avatar"), speaker = el("speaker"), lineJp = el("lineJp"), lineRomaji = el("lineRomaji");
  const progress = el("progress"), capture = el("capture");
  const comboEl = el("combo"), accEl = el("acc"), timeEl = el("time");

  // build starfield
  const stars = el("stars");
  for (let i = 0; i < 46; i++) {
    const s = document.createElement("i");
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 70 + "%";
    s.style.animationDelay = (Math.random() * 3) + "s";
    s.style.transform = `scale(${0.6 + Math.random() * 1.6})`;
    stars.appendChild(s);
  }

  // intro lead {N}
  document.querySelector("#startScreen .lead").innerHTML =
    document.querySelector("#startScreen .lead").innerHTML.replace("{N}", CUTS.length);

  // build progress dots
  CUTS.forEach(() => { const d = document.createElement("span"); progress.appendChild(d); });
  const dots = [...progress.children];

  let idx = 0;          // current cut
  let exp = "";         // expected romaji (lowercase)
  let pos = 0;          // pointer into exp
  let started = false;  // timer started
  let startT = 0, endT = 0;
  let correct = 0, miss = 0, combo = 0, maxCombo = 0;
  let raf = 0;

  function skipSpaces() { while (pos < exp.length && exp[pos] === " ") pos++; }

  function applyTheme(cut) {
    stage.style.setProperty("--g1", cut.g1);
    stage.style.setProperty("--g2", cut.g2);
    avatar.style.setProperty("--c1", cut.c1);
    avatar.style.setProperty("--c2", cut.c2);
    document.documentElement.style.setProperty("--c1", cut.c1);
  }

  function renderRomaji() {
    let html = "";
    for (let i = 0; i < exp.length; i++) {
      const ch = exp[i] === " " ? "&nbsp;" : exp[i];
      const cls = i < pos ? "done" : (i === pos ? "cur" : "todo");
      html += `<span class="${cls}">${ch}</span>`;
    }
    lineRomaji.innerHTML = html;
  }

  function loadCut(i) {
    const cut = CUTS[i];
    applyTheme(cut);
    avatar.textContent = cut.glyph;
    speaker.querySelector ? null : null;
    el("speaker").textContent = cut.who;
    lineJp.textContent = cut.jp;
    exp = cut.romaji.toLowerCase();
    pos = 0; skipSpaces();
    renderRomaji();
    dots.forEach((d, k) => { d.className = k < i ? "on" : (k === i ? "now" : ""); });
    scene.classList.remove("pop"); void scene.offsetWidth; scene.classList.add("pop");
  }

  function updateStats() {
    comboEl.textContent = combo;
    const total = correct + miss;
    accEl.textContent = total ? Math.round((correct / total) * 100) : 100;
  }

  function tick() {
    timeEl.textContent = ((performance.now() - startT) / 1000).toFixed(1);
    raf = requestAnimationFrame(tick);
  }

  function handleChar(ch) {
    if (!ch) return;
    ch = ch.toLowerCase();
    if (ch.length !== 1) return;
    if (!started) { started = true; startT = performance.now(); raf = requestAnimationFrame(tick); }

    if (ch === exp[pos]) {
      pos++; correct++; combo++; maxCombo = Math.max(maxCombo, combo);
      skipSpaces();
      renderRomaji();
      updateStats();
      if (pos >= exp.length) nextCut();
    } else {
      miss++; combo = 0; updateStats();
      lineRomaji.classList.remove("miss"); void lineRomaji.offsetWidth; lineRomaji.classList.add("miss");
    }
  }

  function nextCut() {
    idx++;
    if (idx >= CUTS.length) return finish();
    setTimeout(() => loadCut(idx), 260);
  }

  function finish() {
    endT = performance.now();
    cancelAnimationFrame(raf);
    const secs = (endT - startT) / 1000;
    const total = correct + miss;
    const acc = total ? Math.round((correct / total) * 100) : 100;
    // rank by accuracy + speed
    const cpm = correct / (secs / 60);
    let rank = "C";
    if (acc >= 98 && cpm >= 220) rank = "S";
    else if (acc >= 95 && cpm >= 160) rank = "A";
    else if (acc >= 90 && cpm >= 110) rank = "B";
    el("rTime").textContent = secs.toFixed(1);
    el("rAcc").textContent = acc;
    el("rCombo").textContent = maxCombo;
    el("rank").textContent = rank;
    window._lastResult = { secs: secs.toFixed(1), acc, maxCombo, rank };
    el("resultScreen").classList.remove("hidden");
  }

  function startGame() {
    idx = 0; correct = 0; miss = 0; combo = 0; maxCombo = 0; started = false;
    cancelAnimationFrame(raf);
    timeEl.textContent = "0.0"; updateStats();
    el("startScreen").classList.add("hidden");
    el("resultScreen").classList.add("hidden");
    el("shareHint").textContent = " ";
    loadCut(0);
    focusCapture();
  }

  function focusCapture() { try { capture.focus({ preventScroll: true }); } catch (_) {} }

  // ---- input wiring (works on desktop keydown + mobile input event) ----
  capture.addEventListener("input", (e) => {
    const data = e.data || capture.value;
    if (data) for (const ch of data) handleChar(ch);
    capture.value = "";
  });
  document.addEventListener("keydown", (e) => {
    if (e.metaKey || e.ctrlKey || e.altKey) return;
    if (e.key && e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
      handleChar(e.key);
      e.preventDefault();
    }
  });
  stage.addEventListener("click", focusCapture);

  el("startBtn").addEventListener("click", startGame);
  el("retryBtn").addEventListener("click", startGame);
  el("shareBtn").addEventListener("click", async () => {
    const r = window._lastResult; if (!r) return;
    const text = `星待ちの放課後｜ランク${r.rank} ／ ${r.secs}s ／ 正確率${r.acc}% ／ 最大コンボ${r.maxCombo}`;
    try { await navigator.clipboard.writeText(text); el("shareHint").textContent = "記録をコピーしました ✓"; }
    catch (_) { el("shareHint").textContent = text; }
  });
})();
</script>
</body>
</html>
